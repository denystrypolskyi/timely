app.frontend-url=${FRONTEND_URL:}
app.oauth2-redirect-url=${OAUTH2_REDIRECT_URL:}
app.oauth2-enabled=${OAUTH2_ENABLED:false}
app.registration-enabled=${REGISTRATION_ENABLED:false}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.issuer=timely-backend
app.jwt.audience=timely-api

spring.jpa.show-sql=false
logging.level.org.springframework.security=INFO

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

server.forward-headers-strategy=framework
