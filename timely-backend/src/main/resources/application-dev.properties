app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.oauth2-redirect-url=${OAUTH2_REDIRECT_URL:http://localhost:5173/oauth2/redirect}
app.oauth2-enabled=${OAUTH2_ENABLED:false}
app.registration-enabled=${REGISTRATION_ENABLED:true}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.issuer=timely-backend
app.jwt.audience=timely-api

spring.jpa.show-sql=true
logging.level.org.springframework.security=DEBUG
